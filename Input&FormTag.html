<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input and form</title>
</head>
<body>
    <center><h1>Form</h1></center>
    <hr>
    <center>
        <form action="" method="get" enctype="multipart/form-data">
            Name: <input type="text" name="name" id="name" placeholder="Enter Your Name"> <br><br>

            Age: <input type="number" name="age" id="age" placeholder="Enter Your Age"> <br><br>

            Email: <input type="email" name="email" id="email" placeholder="Enter Your Email"> <br><br>

            Password: <input type="password" name="password" id="password" placeholder="Enter Strong Password"> <br><br>

            Gender: 
            <input type="radio" name="gender" id="male">Male
            <input type="radio" name="gender" id="female">Female <br><br>

            Select Subject: 
            <input type="checkbox" name="subject" value = "html">HTML
            <input type="checkbox" name="subject" value = "css">CSS
            <input type="checkbox" name="subject" value = "js">JS<br><br>

            Upload image: <input type="file" name="image" id="image"> <br><br><hr>
            
            Address: <textarea name = "message" id="message" placeholder="Enter Your Complete Address "></textarea>
            <hr>

            Date: <input type="date" name="date" id="date"><br><br>

            Time: <input type="time" name="time" id="time"><br><br>

            Datetime: <input type="datetime" name="datetime-local" id="datetime"><br><br>

            Select Branch: 
            <select>
                <option value="A">AI&DS</option>
                <option value="B">AI&Ml</option>
                <option value="C">ECE</option>
                <option value="D">CSE</option>
            </select>
            <hr>
            <input type="reset" value = "reset">
            <input type="submit" value = "submit">
        </form>
    </center>
</body>
</html>
